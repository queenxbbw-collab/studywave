[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install"]

[phases.build]
cmds = [
  "BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/studywave run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production pnpm --filter @workspace/api-server run start"
